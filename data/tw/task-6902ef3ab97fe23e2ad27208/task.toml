version = "1.0"

[metadata]
repository = "https://github.com/grafana/grafana"
base_commit = "4550cfb5b72886782d9a3e6cf995f8dbd57ca4ff"

[environment]
docker_image = "ghcr.io/scaleapi/swe-atlas:swe_atlas_TW_grafana_grafana_6902ef3ab97fe23e2ad27208_1.0"
allow_internet = true
cpus = 16
memory_mb = 16384
storage_mb = 20480

[agent]
timeout_sec = 10800

[verifier]
timeout_sec = 900

[verifier.env]
EVAL_API_KEY = "${OPENAI_API_KEY}"
EVAL_BASE_URL = "${OPENAI_API_BASE}"
EVAL_MODEL = "${EVAL_MODEL:-anthropic/claude-opus-4-5-20251101}"
