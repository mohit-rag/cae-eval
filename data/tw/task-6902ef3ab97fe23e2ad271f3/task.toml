version = "1.0"

[metadata]
repository = "https://github.com/Automattic/wp-calypso"
base_commit = "be7e5cc641622d153040491fd5625c6cb83e12eb"

[environment]
docker_image = "ghcr.io/scaleapi/swe-atlas:swe_atlas_TW_Automattic_wp-calypso_6902ef3ab97fe23e2ad271f3_1.0"
allow_internet = true
cpus = 16
memory_mb = 16384
storage_mb = 20480

[agent]
timeout_sec = 10800

[verifier]
timeout_sec = 900

[verifier.env]
EVAL_API_KEY = "${OPENAI_API_KEY}"
EVAL_BASE_URL = "${OPENAI_API_BASE}"
EVAL_MODEL = "${EVAL_MODEL:-anthropic/claude-opus-4-5-20251101}"
