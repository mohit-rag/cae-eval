version = "1.0"

[metadata]
repository = "https://github.com/foxcpp/maddy"
base_commit = "26452dd8dd787dc455278b0fdd296f4a5432c768"

[environment]
docker_image = "ghcr.io/scaleapi/swe-atlas:swe_atlas_TW_foxcpp_maddy_6902ef3ab97fe23e2ad27268_1.0"
allow_internet = true
cpus = 16
memory_mb = 16384
storage_mb = 20480

[agent]
timeout_sec = 10800

[verifier]
timeout_sec = 900

[verifier.env]
EVAL_API_KEY = "${OPENAI_API_KEY}"
EVAL_BASE_URL = "${OPENAI_API_BASE}"
EVAL_MODEL = "${EVAL_MODEL:-anthropic/claude-opus-4-5-20251101}"
